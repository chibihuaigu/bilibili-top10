<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站TOP 10 UP主粉丝数</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .update-time {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .update-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .update-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header {
            background: #f8f9fa;
            padding: 15px 25px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        th:first-child {
            text-align: center;
            width: 60px;
        }
        th:nth-child(3) {
            text-align: right;
        }
        th:nth-child(4) {
            text-align: center;
        }
        td {
            padding: 15px 25px;
            border-bottom: 1px solid #eee;
        }
        td:first-child {
            text-align: center;
            font-weight: bold;
            color: #667eea;
        }
        td:nth-child(3) {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        td:nth-child(4) {
            text-align: center;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .rank-1 { background: linear-gradient(90deg, #ffd700 0%, #fff 100%); }
        .rank-2 { background: linear-gradient(90deg, #c0c0c0 0%, #fff 100%); }
        .rank-3 { background: linear-gradient(90deg, #cd7f32 0%, #fff 100%); }
        .fans-count {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }
        .fans-wan {
            color: #667eea;
            font-weight: bold;
        }
        footer {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.85rem;
            opacity: 0.8;
        }
        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
            th, td { padding: 10px 12px; font-size: 0.9rem; }
            .card-header { padding: 10px 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 B站粉丝最多的 TOP 10 UP主</h1>
            <p class="update-time">数据更新时间：<span id="updateTime">加载中...</span></p>
            <button class="update-btn" onclick="loadData()">🔄 刷新数据</button>
        </header>
        
        <div class="card">
            <div class="card-header">
                <strong>实时粉丝数据</strong>
                <span>每点击刷新一次</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>UP主</th>
                        <th>粉丝数</th>
                        <th>约</th>
                    </tr>
                </thead>
                <tbody id="dataBody">
                    <tr><td colspan="4" style="text-align:center;padding:40px;">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        
        <footer>
            <p>数据来源：zeroroku.com | 每小时自动更新</p>
            <p>如需最新数据，点击上方「刷新数据」按钮</p>
        </footer>
    </div>

    <script>
        // B站 TOP 10 UP主 MID 列表
        const UP_LIST = [
            { name: "罗翔说刑法", mid: "517327498" },
            { name: "一数", mid: "14229967" },
            { name: "老番茄", mid: "546195" },
            { name: "影视飓风", mid: "946974" },
            { name: "小潮院长", mid: "5970160" },
            { name: "木鱼水心", mid: "927587" },
            { name: "帕梅拉PamelaReif", mid: "604003146" },
            { name: "老师好我叫何同学", mid: "163637592" },
            { name: "英语兔", mid: "483162496" },
            { name: "绵羊料理", mid: "18202105" }
        ];

        async function loadData() {
            document.getElementById('dataBody').innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;">正在获取数据...</td></tr>';
            
            try {
                // 从 zeroroku.com 获取数据
                const response = await fetch('https://zeroroku.com/bilibili/rank');
                const html = await response.text();
                
                // 解析数据
                const data = parseData(html);
                
                // 更新显示
                renderTable(data);
                document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
            } catch (error) {
                console.error('获取失败:', error);
                // 如果获取失败，使用备用数据
                useBackupData();
            }
        }

        function parseData(html) {
            const exclude = ["哔哩哔哩", "大会员", "漫画", "直播", "会员购", "创作中心", "课堂",
                            "晚会", "番剧", "电影", "英雄联盟赛事", "央视新闻", "新华社",
                            "人民日报", "共青团中央", "原神", "崩坏", "王者荣耀", "云视听"];
            
            const data = [];
            const lines = html.split('\n');
            
            for (const line of lines) {
                // 跳过排除项
                if (exclude.some(kw => line.includes(kw))) continue;
                
                // 匹配格式: 排名 名称 粉丝数
                const match = line.match(/(\d{2})\s+([^\d]+?)\s+([\d,]+)/);
                if (match) {
                    const rank = parseInt(match[1]);
                    const name = match[2].trim();
                    const fans = parseInt(match[3].replace(/,/g, ''));
                    
                    // 只保留 TOP 10 个人UP主
                    if (fans > 10000000 && data.length < 10) {
                        data.push({ rank, name, fans });
                    }
                }
                if (data.length >= 10) break;
            }
            
            return data;
        }

        function renderTable(data) {
            const tbody = document.getElementById('dataBody');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;">获取数据失败，请稍后重试</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.map((item, index) => `
                <tr class="rank-${index + 1}">
                    <td>${index + 1}</td>
                    <td><strong>${item.name}</strong></td>
                    <td class="fans-count">${item.fans.toLocaleString()}</td>
                    <td class="fans-wan">${(item.fans / 10000).toFixed(1)}万</td>
                </tr>
            `).join('');
        }

        function useBackupData() {
            // 备用数据（上次获取的数据）
            const backupData = [
                { name: "罗翔说刑法", fans: 32063569 },
                { name: "一数", fans: 23569493 },
                { name: "老番茄", fans: 20168768 },
                { name: "影视飓风", fans: 15687324 },
                { name: "小潮院长", fans: 15087607 },
                { name: "木鱼水心", fans: 14547985 },
                { name: "帕梅拉PamelaReif", fans: 14089349 },
                { name: "老师好我叫何同学", fans: 12692909 },
                { name: "英语兔", fans: 12608608 },
                { name: "绵羊料理", fans: 11945966 }
            ];
            
            const data = backupData.map((item, index) => ({
                rank: index + 1,
                name: item.name,
                fans: item.fans
            }));
            
            renderTable(data);
            document.getElementById('updateTime').textContent = '备用数据（网络不稳定）';
        }

        // 页面加载时自动获取数据
        window.onload = loadData;
    </script>
</body>
</html>
